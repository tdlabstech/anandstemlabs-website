<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anand STEM Labs - Under Construction</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#0f172a;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

.container{
    text-align:center;
    max-width:900px;
    padding:40px;
}

img{
    width:380px;
    max-width:90%;
    margin-bottom:30px;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

h1{
    font-size:3rem;
    margin-bottom:15px;
}

p{
    font-size:1.2rem;
    color:#cbd5e1;
    line-height:1.8;
}

.loader{
    width:220px;
    height:6px;
    background:#1e293b;
    margin:35px auto;
    border-radius:10px;
    overflow:hidden;
}

.loader span{
    display:block;
    width:40%;
    height:100%;
    background:#38bdf8;
    animation:loading 2s infinite;
}

@keyframes loading{
    0%{transform:translateX(-100%);}
    100%{transform:translateX(350%);}
}

.footer{
    margin-top:30px;
    color:#94a3b8;
    font-size:14px;
}
</style>

</head>

<body>

<div class="container">

    <!-- Replace this image with your own -->
    <img src="developer-debugging.png" alt="Developer debugging">

    <h1>🚧 Website Under Construction</h1>

    <p>
        We're working hard to build something amazing.
        <br><br>
        Our developer is currently busy debugging... probably that
        <strong>one stubborn bug</strong> that refuses to cooperate. ☕💻
    </p>

    <div class="loader">
        <span></span>
    </div>

    <div class="footer">
        © 2026 Anand STEM Labs<br>
        We'll be online soon.
    </div>

</div>

</body>
</html>
